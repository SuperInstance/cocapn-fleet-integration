name: Fleet Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

jobs:
  resolve-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest JSON
        run: |
          python3 -c "import json; json.load(open('components.lock'))"

      - name: Check all components present
        run: |
          python3 -c "
          import json
          m = json.load(open('components.lock'))
          for name, comp in m['components'].items():
              print(f'{name}: {comp[\"version\"]} @ {comp[\"ref\"]}')
          print(f'Total: {len(m[\"components\"])} components')
          "

  contract-tests:
    runs-on: ubuntu-latest
    needs: resolve-manifest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fleet repos
        run: |
          # Clone all components at pinned refs
          python3 scripts/resolve-components.py --checkout

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install components
        run: |
          # Install each Python component in development mode
          for dir in sunset-ecosystem ccc-os cocapn-health cocapn-traps \
                     vector-novelty pareto-tournament hebbian-router \
                     cocapn-plato turbovec-integration-ccc; do
            if [ -f "$dir/pyproject.toml" ]; then
              pip install -e "$dir"
            fi
          done

      - name: Run contract tests
        run: |
          pip install pytest
          pytest tests/test_contracts.py -v --tb=short

  integration-smoke:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fleet repos
        run: python3 scripts/resolve-components.py --checkout

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install all components
        run: |
          for dir in sunset-ecosystem ccc-os cocapn-health cocapn-traps \
                     vector-novelty pareto-tournament hebbian-router \
                     cocapn-plato turbovec-integration-ccc; do
            if [ -f "$dir/pyproject.toml" ]; then
              pip install -e "$dir"
            fi
          done

      - name: Run smoke tests
        run: |
          pip install pytest
          pytest tests/test_contracts.py -v -k "smoke" --tb=short || true
          # Smoke tests may skip; don't fail the build

  security-audit:
    runs-on: ubuntu-latest
    needs: resolve-manifest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fleet repos
        run: python3 scripts/resolve-components.py --checkout

      - name: Run bandit on all Python repos
        run: |
          pip install bandit
          for dir in sunset-ecosystem ccc-os cocapn-health cocapn-traps \
                     vector-novelty pareto-tournament hebbian-router \
                     cocapn-plato turbovec-integration-ccc; do
            if [ -d "$dir/src" ]; then
              echo "::group::Bandit: $dir"
              bandit -r "$dir/src" -f json -o "bandit-$dir.json" || true
              echo "::endgroup::"
            fi
          done

      - name: Run pip-audit on all Python repos
        run: |
          pip install pip-audit
          for dir in sunset-ecosystem ccc-os cocapn-health cocapn-traps \
                     vector-novelty pareto-tournament hebbian-router \
                     cocapn-plato turbovec-integration-ccc; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "::group::pip-audit: $dir"
              (cd "$dir" && pip-audit --requirement pyproject.toml || true)
              echo "::endgroup::"
            fi
          done

  coverage-gate:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fleet repos
        run: python3 scripts/resolve-components.py --checkout

      - name: Check coverage thresholds
        run: |
          python3 scripts/check-coverage.py --threshold 75
