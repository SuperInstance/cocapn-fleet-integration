# Fleet Service Registry
# Loaded by FleetHTTPClient at init time.

services:
  # Primary fleet repos — add more as services proliferate
  sunset-ecosystem:
    url: http://sunset.internal:8080
    connect_timeout: 5
    read_timeout: 30
    retry_max: 3
    retry_base: 1.0
    breaker_failures: 5
    breaker_window: 60
    breaker_cooldown: 30
    cache_ttl: 60

