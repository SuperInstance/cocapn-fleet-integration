# prometheus.yml
# ---------------------------------------------------------------------------
# Fleet Prometheus — Scrapes every heartbeat, every metric, every breath.
# 15s interval: fast enough to catch thermal spikes, slow enough to stay sane.
# ---------------------------------------------------------------------------
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cocapn-fleet
    replica: "{{.ExternalURL}}"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sunset-ecosystem"
    static_configs:
      - targets: ["sunset-ecosystem.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "ccc-os"
    static_configs:
      - targets: ["ccc-os.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "cocapn-health"
    static_configs:
      - targets: ["cocapn-health.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "cocapn-traps"
    static_configs:
      - targets: ["cocapn-traps.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "cocapn-plato"
    static_configs:
      - targets: ["cocapn-plato.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "turbovec"
    static_configs:
      - targets: ["turbovec.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "flux-vm"
    static_configs:
      - targets: ["flux-vm.cocapn-fleet.svc.cluster.local:8080"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["nexus.cocapn-fleet.svc.cluster.local:6379"]
    metrics_path: /metrics
